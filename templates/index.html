<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A modern, minimalist Tic Tac Toe interface powered by an ML backend.">
    <title>Tic Tac Toe / ML Backend</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <button id="theme-toggle" aria-label="Toggle Dark Mode">
        <svg id="theme-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
    </button>
    <div class="container">
        <header>
            <h1>Tic Tac Toe</h1>
            <p class="subtitle">ML-Powered Opponent</p>
        </header>

        <main>
            <div id="status-container">
                <p id="status">Your turn — you are <strong>X</strong></p>
            </div>

            <div class="board-wrapper">
                <div class="board" id="board">
                    <!-- Cells will be generated by JavaScript -->
                </div>
            </div>

            <div class="controls">
                <button id="reset-button">New Game</button>
            </div>
        </main>

        <footer>
            <p>Full-Stack ML Engineering Project</p>
        </footer>
    </div>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
